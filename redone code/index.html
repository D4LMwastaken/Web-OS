<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>D4LM OS</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
    <div id="topbar">
        <p id="topbarText1">D4LM OS</p>
        <p id="topbarText2">Overview</p>
        <p id="timeElement">Time</p>
    </div>
    <div id="welcomeWindow">
        <p id="welcomeWindowHeader">Welcome</p>
        <p id="welcomeWindowCloseButton">Close</p>
        <p id="welcomeWindowOpenButton">Open</p>
        <h1 id="welcomeHeader">Welcome to my OS</h1>
        <h2 id="welcomeIntroductionHeader">Introduction</h2>
        <img id="welcomeImage" src="https://avatars.githubusercontent.com/u/148903901?v=4"/>
        <br>
        <a id="welcomeInstagramLink" href="https://www.instagram.com/d4lmwastaken/">Instagram</a>
        <h3 id="welcomeHobbies">Hobbies</h3>
        <menu id="welcomeHobbiesMenu">
            <li>Reading</li>
            <li>Programming</li>
            <li>Video Gaming</li>
        </menu>
    </div>
    <div id="chargingApp">
        <p id="chargingAppHeader">Charging App</p>
        <p id="chargingAppCloseButton">Close</p>
        <p id="chargingAppOpenButton">Open</p>
        <div id="chargingAppWindow">
            <img id="chargingAppImage" src="notCharging.jpg"/>
            <br>
            <p id="chargingAppText">Not charging...</p>
        </div>
    </div>
    <div id="earbudsApp">
        <p id="earbudsAppHeader">Earbuds App</p>
        <p id="earbudsAppCloseButton">Close</p>
        <p id="earbudsAppOpenButton">Open</p>
        <div id="earbudsAppWindow">
            <img id="earbudsAppImage" src="close.jpg"/>
            <br>
            <p id="earbudsAppText">Earbuds Closed</p>
        </div>
    </div>
</body>
</html>

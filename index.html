            <script>
                // Sadly this does not work...
                const clickableElement = document.querySelector("#image")
                let open = false;

                function openAndClose() {
                    if (open === false) {
                        open = true
                        clickableElement.image.src = "open.jpg"
                    } else {
                        open = false
                        clickableElement.image.src = "close.jpg"

                clickableElement.addEventListener("click", openAndClose);

            <img id="image" width="444px" height ="auto" src="close.jpg" style="cursor: pointer">
